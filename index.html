        function getWorkoutForDate(date, block, week) {

        function getMonthData(year, month) {
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const firstDayOfWeek = firstDay.getDay();
            const daysInMonth = lastDay.getDate();

            const days = [];

            for (let i = 0; i < firstDayOfWeek; i++) {
                const prevDate = new Date(year, month, i - firstDayOfWeek + 1);
                days.push({ date: prevDate, isCurrentMonth: false });
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                days.push({ date, isCurrentMonth: true });
            }

            const remainingDays = 42 - days.length;
            for (let i = 1; i <= remainingDays; i++) {
                const nextDate = new Date(year, month + 1, i);
                days.push({ date: nextDate, isCurrentMonth: false });
            }

            return days;
        }

        function get6Months(startDate) {
            const months = [];
            for (let i = 0; i < 6; i++) {
                const year = startDate.getFullYear();
                const month = startDate.getMonth() + i;
                months.push({ year: year + Math.floor(month / 12), month: month % 12 });
            }
            return months;
        }

        function getRecommendedHics(workoutHistory) {
            const recentHics = workoutHistory
                .filter(e => e.type === 'tri' && e.details && e.details.hic)
                .slice(-3)
                .map(e => e.details.hic.name);

            const categories = ['Aerobic-Anaerobic', 'General Conditioning', 'Power Development'];
            const picks = [];

            for (const cat of categories) {
                const available = HIC_PRESETS.filter(h => h.category === cat && !recentHics.includes(h.name));
                if (available.length > 0) {
                    const dayIndex = new Date().getDate() % available.length;
                    picks.push(available[dayIndex]);
                }
            }

            while (picks.length < 3) {
                const remaining = HIC_PRESETS.filter(h => !picks.find(p => p.name === h.name));
                if (remaining.length === 0) break;
                picks.push(remaining[0]);
            }

            return picks;
        }

            if (workout.type === 'tri') {

                                            <div style={{ fontSize: '7px', color: summary.accent, textAlign: 'center', lineHeight: '1.1', marginTop: '1px', fontWeight: '600', letterSpacing: '-0.2px' }}>
                                                {isLogged && logLabel ? logLabel : summary.label}

        function Overview({ settings }) {

        function Plan({ settings, workoutOverrides, setWorkoutOverrides, workoutHistory, setWorkoutHistory }) {
            const [selectedCardio, setSelectedCardio] = useState(null);
            const [cardioMetrics, setCardioMetrics] = useState({});
            const [selectedHic, setSelectedHic] = useState(null);
            const [skippedHic, setSkippedHic] = useState(false);
            const [liftData, setLiftData] = useState({});
            const [completedSets, setCompletedSets] = useState({});
            const [completedAccessorySets, setCompletedAccessorySets] = useState({});
            const [accessoryData, setAccessoryData] = useState({});
            const [hicMetrics, setHicMetrics] = useState({});
            const [longNotes, setLongNotes] = useState('');
            const [openDropdowns, setOpenDropdowns] = useState({});
            const [showWorkoutSelector, setShowWorkoutSelector] = useState(false);
            const [completionMessage, setCompletionMessage] = useState('');
            const [showAllHics, setShowAllHics] = useState(false);
            const [showAllCardio, setShowAllCardio] = useState(false);
            const [cardioModality, setCardioModality] = useState(null);

            const today = useMemo(() => {
                const d = new Date();
                d.setHours(0, 0, 0, 0);
                return d;
            }, []);

            const dateKey = today.toISOString().split('T')[0];
            const override = workoutOverrides && workoutOverrides[dateKey];
            let todayWorkout = getWorkoutForDate(today, settings.block, settings.week);
            if (override) {
                todayWorkout = Object.values(WEEKLY_TEMPLATE).find(w => w.type === override.type) || todayWorkout;
            }
            const todayDateStr = today.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

            const weekStart = new Date(today);
            weekStart.setDate(today.getDate() - today.getDay());

            const weekDays = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(weekStart);
                d.setDate(weekStart.getDate() + i);
                weekDays.push(d);
            }

            const restOfWeek = weekDays.slice(today.getDay() + 1);

            useEffect(() => {
                if (todayWorkout.type === 'tri') {
                    if (todayWorkout.name.includes('Run')) {
                        setCardioModality('run');
                    } else {
                        const lastModality = getLastCardioModality(workoutHistory, today.getDay());
                        setCardioModality(lastModality === 'swim' ? 'bike' : 'swim');
                    }
                } else if (todayWorkout.type === 'long') {
                    setCardioModality('endurance-bike');
                }
            }, [todayWorkout.type, todayWorkout.name]);

            // Auto-fill accessory weights from last logged session
            useEffect(() => {
                if (todayWorkout.type === 'strength' && todayWorkout.accessories) {
                    const accs = ACCESSORIES[todayWorkout.accessories] || [];
                    const prefill = {};
                    let hasData = false;
                    accs.forEach(acc => {
                        for (let i = workoutHistory.length - 1; i >= 0; i--) {
                            const entry = workoutHistory[i];
                            if (entry.details?.accessories) {
                                const found = entry.details.accessories.find(a => a.name === acc.name);
                                if (found && found.weight) {
                                    prefill[`${acc.name}-weight`] = found.weight.toString();
                                    hasData = true;
                                    break;
                                }
                            }
                        }
                    });
                    if (hasData) setAccessoryData(prev => {
                        // Only prefill keys that aren't already set by user
                        const merged = { ...prefill };
                        Object.keys(prev).forEach(k => { if (prev[k]) merged[k] = prev[k]; });
                        return merged;
                    });
                }
            }, [todayWorkout.accessories]);

            const handleSetToggle = (liftName, setNum) => {
                const key = `${liftName}-${setNum}`;
                setCompletedSets(prev => ({
                    ...prev,
                    [key]: !prev[key]
                }));
            };

            const handleAccessorySetToggle = (accName, setNum) => {
                const key = `${accName}-${setNum}`;
                setCompletedAccessorySets(prev => ({
                    ...prev,
                    [key]: !prev[key]
                }));
            };

            const toggleDropdown = (idx) => {
                setOpenDropdowns(prev => ({
                    ...prev,
                    [idx]: !prev[idx]
                }));
            };

            const loadingInfo = OPERATOR_LOADING.find(l => l.week === settings.week);

            const getTodayLiftWeight = (liftName) => {
                const lift = OPERATOR_LIFTS.find(l => l.name === liftName);
                if (!lift) return 0;
                const oneRM = settings[lift.settingsKey];
                return Math.round(oneRM * (loadingInfo.percentage / 100));
            };

            const getLastAccessoryData = (exerciseName) => {
                for (let i = workoutHistory.length - 1; i >= 0; i--) {
                    const entry = workoutHistory[i];
                    if (entry.details && entry.details.accessories) {
                        const found = entry.details.accessories.find(a => a.name === exerciseName);
                        if (found) return found;
                    }
                }
                return null;
            };

            const getNextWorkout = () => {
                const tomorrow = new Date(today);
                tomorrow.setDate(tomorrow.getDate() + 1);
                return getWorkoutForDate(tomorrow, settings.block, settings.week);
            };

            const handleCompleteWorkout = () => {
                if (todayWorkout.type === 'strength') {
                    const lifts = [];
                    for (const lift of OPERATOR_LIFTS) {
                        const weight = parseInt(liftData[`${lift.name}-weight`] || getTodayLiftWeight(lift.name));
                        const reps = parseInt(liftData[`${lift.name}-reps`] || loadingInfo.reps);
                        let completedSetsCount = 0;
                        for (let i = 1; i <= loadingInfo.sets; i++) {
                            if (completedSets[`${lift.name}-${i}`]) completedSetsCount++;
                        }
                        lifts.push({ name: lift.name, weight, reps, setsCompleted: completedSetsCount });
                    }

                    const accessories = [];
                    const accessoryList = ACCESSORIES[todayWorkout.accessories];
                    for (const acc of accessoryList) {
                        const weight = parseInt(accessoryData[`${acc.name}-weight`] || 0);
                        const reps = parseInt(accessoryData[`${acc.name}-reps`] || acc.reps);
                        let completedSetsCount = 0;
                        for (let i = 1; i <= acc.sets; i++) {
                            if (completedAccessorySets[`${acc.name}-${i}`]) completedSetsCount++;
                        }
                        accessories.push({ name: acc.name, weight, reps, setsCompleted: completedSetsCount });
                    }

                    const entry = {
                        date: new Date().toISOString(),
                        workoutName: todayWorkout.name,
                        type: 'strength',
                        details: {
                            lifts,
                            accessories,
                            loading: { sets: loadingInfo.sets, reps: loadingInfo.reps, percentage: loadingInfo.percentage }
                        }
                    };

                    setWorkoutHistory(prev => [...prev, entry]);
                    setCompletionMessage('Workout Logged!');
                    setTimeout(() => setCompletionMessage(''), 3000);

                    setLiftData({});
                    setCompletedSets({});
                    setAccessoryData({});
                    setCompletedAccessorySets({});
                } else if (todayWorkout.type === 'tri') {
                    if (!selectedCardio) {
                        alert('Please select a cardio workout');
                        return;
                    }
                    if (!selectedHic && !skippedHic) {
                        alert('Please select an HIC or skip it');
                        return;
                    }

                    const entry = {
                        date: new Date().toISOString(),
                        workoutName: todayWorkout.name,
                        type: 'tri',
                        details: {
                            cardio: { name: selectedCardio, metrics: { ...cardioMetrics } },
                            hic: skippedHic ? { name: 'Skipped', skipped: true } : { name: selectedHic, metrics: { ...hicMetrics } }
                        }
                    };

                    setWorkoutHistory(prev => [...prev, entry]);
                    setCompletionMessage('Workout Logged!');
                    setTimeout(() => setCompletionMessage(''), 3000);

                    setSelectedCardio(null);
                    setCardioMetrics({});
                    setSelectedHic(null);
                    setSkippedHic(false);
                    setHicMetrics({});
                } else if (todayWorkout.type === 'long') {
                    if (!selectedCardio) {
                        alert('Please select a cardio workout');
                        return;
                    }

                    const entry = {
                        date: new Date().toISOString(),
                        workoutName: todayWorkout.name,
                        type: 'long',
                        details: {
                            cardio: { name: selectedCardio, metrics: { ...cardioMetrics } },
                            notes: longNotes
                        }
                    };

                    setWorkoutHistory(prev => [...prev, entry]);
                    setCompletionMessage('Workout Logged!');
                    setTimeout(() => setCompletionMessage(''), 3000);

                    setSelectedCardio(null);
                    setCardioMetrics({});
                    setLongNotes('');
                }
            };

            const recommendedHics = useMemo(() => getRecommendedHics(workoutHistory), [workoutHistory]);
            const hicFields = HIC_INPUT_FIELDS[selectedHic] || DEFAULT_HIC_FIELDS;

            const getCardioPresetsForModality = (showAll) => {
                let presets = [];
                if (cardioModality === 'swim') presets = SWIM_PRESETS;
                else if (cardioModality === 'bike') presets = BIKE_PRESETS;
                else if (cardioModality === 'run') presets = RUN_PRESETS;
                else if (cardioModality === 'endurance-bike') presets = BIKE_ENDURANCE_PRESETS;
                else if (cardioModality === 'endurance-run') presets = RUN_ENDURANCE_PRESETS;
                else return [];

                if (showAll) return presets;
                // Return the workout matched to the current week
                const weekPreset = getCardioForWeek(presets, settings.week);
                return weekPreset ? [weekPreset] : [presets[0]];
            };

            const getAvailableModalities = () => {
                if (todayWorkout.type === 'tri' && todayWorkout.name.includes('Run')) {
                    return [{ label: 'Run', value: 'run' }];
                }
                if (todayWorkout.type === 'tri') {
                    return [
                        { label: 'Swim', value: 'swim' },
                        { label: 'Bike', value: 'bike' }
                    ];
                }
                return [
                    { label: 'Endurance Bike', value: 'endurance-bike' },
                    { label: 'Z2 Run', value: 'endurance-run' }
                ];
            };

            return (
                <div className="page-content">
                    {completionMessage && <div className="completion-message">{completionMessage}</div>}

        function Settings({ settings, setSettings }) {
            const [savedGroupMessage, setSavedGroupMessage] = useState('');

            const handleChange = (key, value) => {
                setSettings(prev => ({
                    ...prev,
                    [key]: isNaN(value) ? value : parseInt(value, 10)
                }));
            };

            const handleSaveGroup = (groupName) => {
                setSavedGroupMessage(groupName);
                setTimeout(() => setSavedGroupMessage(''), 2000);
            };

            const secondsToMinSecFormat = (seconds) => {
                if (seconds === 0) return '';
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const minSecFormatToSeconds = (str) => {
                if (!str) return 0;
                const parts = str.split(':');
                if (parts.length === 2) {
                    const mins = parseInt(parts[0], 10);
                    const secs = parseInt(parts[1], 10);
                    return mins * 60 + secs;
                }
                return 0;
            };

            const handleExport = () => {
                const dataStr = JSON.stringify(settings, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'training_settings.json';
                a.click();
                URL.revokeObjectURL(url);
            };

            return (
                <div className="page-content">

                    <div className="settings-group">
                        <div className="settings-group-title">Profile</div>
                        <div className="settings-field">
                            <label>Name</label>
                            <input
                                type="text"
                                value={settings.name}
                                onChange={(e) => handleChange('name', e.target.value)}
                            />
                        </div>
                    </div>

                    <div className="settings-group">
                        <div className="flex justify-between items-center mb-4">
                            <div className="settings-group-title">1RM Values</div>
                            <button className="btn btn-secondary text-xs px-3 py-1" onClick={() => handleSaveGroup('1RM')}>
                                Save
                            </button>
                        </div>
                        {savedGroupMessage === '1RM' && <div className="text-green-400 text-sm mb-2">Saved!</div>}
                        <div className="settings-field">
                            <label>Bench Press 1RM (lbs)</label>
                            <input
                                type="number"
                                value={settings.benchPress1RM}
                                onChange={(e) => handleChange('benchPress1RM', e.target.value)}
                            />
                        </div>
                        <div className="settings-field">
                            <label>Back Squat 1RM (lbs)</label>
                            <input
                                type="number"
                                value={settings.squat1RM}
                                onChange={(e) => handleChange('squat1RM', e.target.value)}
                            />
                        </div>
                        <div className="settings-field">
                            <label>Weighted Pull-up 1RM (lbs)</label>
                            <input
                                type="number"
                                value={settings.weightedPullup1RM}
                                onChange={(e) => handleChange('weightedPullup1RM', e.target.value)}
                            />
                        </div>
                    </div>

                    <div className="settings-group">
                        <div className="flex justify-between items-center mb-4">
                            <div className="settings-group-title">Lactate Thresholds</div>
                            <button className="btn btn-secondary text-xs px-3 py-1" onClick={() => handleSaveGroup('LT')}>
                                Save
                            </button>
                        </div>
                        {savedGroupMessage === 'LT' && <div className="text-green-400 text-sm mb-2">Saved!</div>}
                        <div className="settings-field">
                            <label>Run LT Pace (MM:SS per mile)</label>
                            <input
                                type="text"
                                placeholder="6:30"
                                value={secondsToMinSecFormat(settings.runLTPace)}
                                onChange={(e) => handleChange('runLTPace', minSecFormatToSeconds(e.target.value))}
                            />
                        </div>
                        <div className="settings-field">
                            <label>Run LT Heart Rate (bpm)</label>
                            <input
                                type="number"
                                value={settings.runLTHR}
                                onChange={(e) => handleChange('runLTHR', e.target.value)}
                            />
                        </div>
                        <div className="settings-field">
                            <label>Bike FTP (watts)</label>
                            <input
                                type="number"
                                value={settings.bikeFTP}
                                onChange={(e) => handleChange('bikeFTP', e.target.value)}
                            />
                        </div>
                        <div className="settings-field">
                            <label>Bike LT Heart Rate (bpm)</label>
                            <input
                                type="number"
                                value={settings.bikeLTHR}
                                onChange={(e) => handleChange('bikeLTHR', e.target.value)}
                            />
                        </div>
                    </div>

                    <div className="settings-group">
                        <div className="flex justify-between items-center mb-4">
                            <div className="settings-group-title">Program Progress</div>
                            <button className="btn btn-secondary text-xs px-3 py-1" onClick={() => handleSaveGroup('Progress')}>
                                Save
                            </button>
                        </div>
                        {savedGroupMessage === 'Progress' && <div className="text-green-400 text-sm mb-2">Saved!</div>}
                        <div className="settings-field">
                            <label>Current Block</label>
                            <input
                                type="number"
                                min="1"
                                max="6"
                                value={settings.block}
                                onChange={(e) => handleChange('block', e.target.value)}
                            />
                        </div>
                        <div className="settings-field">
                            <label>Current Week</label>
                            <input
                                type="number"
                                min="1"
                                max="6"
                                value={settings.week}
                                onChange={(e) => handleChange('week', e.target.value)}
                            />
                        </div>
                    </div>

                    <button className="btn btn-secondary w-full" onClick={handleExport}>
                        Export Settings
                    </button>
                </div>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [settings, setSettings] = useState(() => {
                try {
                    const saved = localStorage.getItem('trainingAppSettings');
                    return saved ? JSON.parse(saved) : defaultSettings;
                } catch {
                    return defaultSettings;
                }
            });
            const [workoutHistory, setWorkoutHistory] = useState(() => {
                try {
                    const saved = localStorage.getItem('trainingAppHistory');
                    return saved ? JSON.parse(saved) : [];
                } catch {
                    return [];
                }
            });
            const [workoutOverrides, setWorkoutOverrides] = useState(() => {
                try {
                    const saved = localStorage.getItem('trainingAppOverrides');
                    return saved ? JSON.parse(saved) : {};
                } catch {
                    return {};
                }
            });

            useEffect(() => {
                localStorage.setItem('trainingAppSettings', JSON.stringify(settings));
            }, [settings]);

            const historyInitialized = useRef(false);
            useEffect(() => {
                // Guard: never overwrite existing history with empty array
                // This prevents crash-remount from wiping saved data
                if (workoutHistory.length === 0 && !historyInitialized.current) {
                    historyInitialized.current = true;
                    return;
                }
                historyInitialized.current = true;
                localStorage.setItem('trainingAppHistory', JSON.stringify(workoutHistory));
            }, [workoutHistory]);

            useEffect(() => {
                localStorage.setItem('trainingAppOverrides', JSON.stringify(workoutOverrides));
            }, [workoutOverrides]);

            const renderTab = () => {
                switch (activeTab) {
                    case 'dashboard':
                        return <Dashboard settings={settings} workoutOverrides={workoutOverrides} workoutHistory={workoutHistory} />;
                    case 'overview':
                        return <Overview settings={settings} />;
                    case 'plan':
                        return <Plan settings={settings} workoutOverrides={workoutOverrides} setWorkoutOverrides={setWorkoutOverrides} workoutHistory={workoutHistory} setWorkoutHistory={setWorkoutHistory} />;
                    case 'history':
                        return <History workoutHistory={workoutHistory} />;
                    case 'settings':
                        return <Settings settings={settings} setSettings={setSettings} />;
                    default:
                        return <Dashboard settings={settings} workoutOverrides={workoutOverrides} workoutHistory={workoutHistory} />;
                }
            };

            return (
                <div className="flex flex-col bg-slate-950" style={{ height: '100dvh' }}>
                    <header className="bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900 border-b border-slate-700 px-4 py-4">
                        <h1 className="text-2xl font-bold text-slate-100">Luke's Get Ripped Quick Program</h1>
                        <p className="text-sm text-slate-400 mt-1">Block {settings.block} / Week {settings.week}</p>
                    </header>

                    <main className="flex-1 overflow-auto" style={{ WebkitOverflowScrolling: 'touch' }}>
                        {renderTab()}
                    </main>

                    <nav className="border-t border-slate-700 bg-slate-950 flex justify-around items-center px-2 py-3">
                        <button
                            onClick={() => setActiveTab('dashboard')}
                            className={`flex flex-col items-center gap-1 p-2 rounded transition ${activeTab === 'dashboard' ? 'text-blue-400' : 'text-slate-500 hover:text-slate-300'}`}
                        >
                            <IconGrid />
                            <span className="text-xs">Dashboard</span>
                        </button>
                        <button
                            onClick={() => setActiveTab('overview')}
                            className={`flex flex-col items-center gap-1 p-2 rounded transition ${activeTab === 'overview' ? 'text-blue-400' : 'text-slate-500 hover:text-slate-300'}`}
                        >
                            <IconEye />
                            <span className="text-xs">Overview</span>
                        </button>
                        <button
                            onClick={() => setActiveTab('plan')}
                            className={`flex flex-col items-center gap-1 p-2 rounded transition ${activeTab === 'plan' ? 'text-blue-400' : 'text-slate-500 hover:text-slate-300'}`}
                        >
                            <IconClipboard />
                            <span className="text-xs">Plan</span>
                        </button>
                        <button
                            onClick={() => setActiveTab('history')}
                            className={`flex flex-col items-center gap-1 p-2 rounded transition ${activeTab === 'history' ? 'text-blue-400' : 'text-slate-500 hover:text-slate-300'}`}
                        >
                            <IconClock />
                            <span className="text-xs">History</span>
                        </button>
                        <button
                            onClick={() => setActiveTab('settings')}
                            className={`flex flex-col items-center gap-1 p-2 rounded transition ${activeTab === 'settings' ? 'text-blue-400' : 'text-slate-500 hover:text-slate-300'}`}
                        >
                            <IconGear />
                            <span className="text-xs">Settings</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
